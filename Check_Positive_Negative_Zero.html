<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        function checkNum(callback){
            callback(5);
        }

        function result(a){
            if(a>0){
                console.log("Number is Positive");
            }else if(a===0){
                console.log("Number is Zero");
            }else{
                console.log("Number is Negative");
            }
        }

        checkNum(result);
    </script>
</body>
</html>
