<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        console.log(
        (function(str){
            let res=""

            for(let a of str){
                let code=a.charCodeAt(0);

                if(code>=65 && code<=90){
                    res=res+String.fromCharCode(code+32)
                }else{
                    res=res+a;
                }
            }

            return res
        })("MANAS")
    );
    </script>
</body>
</html>
