<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let Counter=function(int){
            let count=int;

            return{
                increment:function (){
                    count++;
                    return count;
                },
                decrement:function (){
                    count--;
                    return count;
                }
            }
        }

        let c=Counter(5);
        console.log(c.increment());
        console.log(c.increment());
        console.log(c.increment());
        console.log(c.decrement());
        console.log(c.decrement());
    </script>
</body>
</html>
