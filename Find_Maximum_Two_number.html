<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        function checkNum(num,callback){
            callback(num);
        }

        checkNum(10,(a)=>{
            if(a>0){
                console.log("Positive Number");
            }else if(a===0){
                console.log("Zero");
            }else{
                console.log("Negative Number");
            }
        });
    </script>
</body>
</html>
